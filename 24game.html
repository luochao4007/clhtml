<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24 Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e0e0e0;
    padding: 16px;
  }
  .container {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 40px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  h1 {
    text-align: center;
    font-size: 2.2rem;
    margin-bottom: 4px;
    color: #f5c542;
  }
  .subtitle {
    text-align: center;
    font-size: 0.95rem;
    color: #aaa;
    margin-bottom: 24px;
  }

  /* ── Number cards ── */
  .number-cards {
    display: grid;
    grid-template-columns: repeat(2, min(40vw, 200px));
    gap: 16px;
    justify-content: center;
    margin-bottom: 20px;
    align-items: center;
  }
  .card {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: min(16vw, 7rem);
    font-weight: bold;
    border: 2px solid rgba(245,197,66,0.4);
    border-radius: 14px;
    background: rgba(0,0,0,0.3);
    color: #f5c542;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover { border-color: #f5c542; }
  .card.selected {
    border-color: #50c878;
    background: rgba(80,200,120,0.15);
    box-shadow: 0 0 14px rgba(80,200,120,0.3);
    transform: scale(1.05);
  }
  .card.used {
    visibility: hidden;
  }
  .card.result-card {
    animation: popIn 0.3s ease-out;
  }
  @keyframes popIn {
    0% { transform: scale(0.6); opacity: 0.3; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── Operator buttons ── */
  .op-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .op-btn {
    width: min(20vw, 100px);
    height: min(16vw, 80px);
    font-size: min(8vw, 3rem);
    font-weight: bold;
    border: 2px solid rgba(100,160,255,0.4);
    border-radius: 12px;
    background: rgba(100,160,255,0.1);
    color: #7db4ff;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .op-btn:hover { border-color: #7db4ff; background: rgba(100,160,255,0.2); }
  .op-btn:active { transform: scale(0.95); }
  .op-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .op-btn.op-selected {
    border-color: #7db4ff;
    background: rgba(100,160,255,0.35);
    box-shadow: 0 0 14px rgba(100,160,255,0.3);
    transform: scale(1.05);
  }

  /* ── Action buttons ── */
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
  }
  button {
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:active { transform: scale(0.97); }
  .btn-new {
    background: linear-gradient(135deg, #f5c542, #e6a817);
    color: #1a1a2e;
  }
  .btn-new:hover { box-shadow: 0 4px 20px rgba(245,197,66,0.4); }
  .btn-undo {
    background: rgba(255,255,255,0.12);
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-undo:hover { background: rgba(255,255,255,0.2); }
  .btn-hint {
    background: rgba(80,200,120,0.12);
    color: #50c878;
    border: 1px solid rgba(80,200,120,0.3);
  }
  .btn-hint:hover { background: rgba(80,200,120,0.22); }

  /* ── Edit mode cards ── */
  .card-edit {
    width: 100%;
    aspect-ratio: 1;
    text-align: center;
    font-size: min(16vw, 7rem);
    font-weight: bold;
    border: 2px solid rgba(245,197,66,0.7);
    border-radius: 14px;
    background: rgba(0,0,0,0.4);
    color: #f5c542;
    outline: none;
    -moz-appearance: textfield;
  }
  .card-edit::-webkit-outer-spin-button,
  .card-edit::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .card-edit:focus {
    border-color: #f5c542;
    box-shadow: 0 0 12px rgba(245,197,66,0.4);
  }
  .btn-edit {
    background: rgba(245,197,66,0.12);
    color: #f5c542;
    border: 1px solid rgba(245,197,66,0.3);
  }
  .btn-edit:hover { background: rgba(245,197,66,0.22); }

  /* ── Message area ── */
  .message {
    text-align: center;
    font-size: 1rem;
    min-height: 28px;
    margin-bottom: 16px;
    color: #aaa;
  }
  .message.win {
    font-size: 1.4rem;
    font-weight: bold;
    color: #50c878;
    animation: celebrate 0.5s ease-out;
  }
  .message.lose {
    color: #ff8a8a;
    font-weight: 600;
  }
  @keyframes celebrate {
    0% { transform: scale(0.8); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* ── Steps log ── */
  .steps {
    list-style: none;
    padding: 0;
    margin-bottom: 16px;
  }
  .steps li {
    padding: 5px 12px;
    margin-bottom: 4px;
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 0.95rem;
    color: #bbb;
    border-left: 3px solid rgba(245,197,66,0.4);
  }

  /* ── Hint area ── */
  #hint-area {
    min-height: 0;
  }
  .result-box {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(80,200,120,0.4);
    border-radius: 12px;
    padding: 16px;
    margin-top: 8px;
  }
  .result-title {
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 0.95rem;
    color: #50c878;
  }
  .solution-list {
    list-style: none;
    padding: 0;
    max-height: 200px;
    overflow-y: auto;
  }
  .solution-list li {
    padding: 6px 10px;
    margin-bottom: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    color: #f0f0f0;
    border-left: 3px solid #f5c542;
  }
  .solution-count {
    font-size: 0.8rem;
    color: #888;
    margin-top: 8px;
    text-align: right;
  }

  /* ── Mobile portrait ── */
  @media screen and (max-width: 480px) {
    body {
      align-items: flex-start;
      padding: 12px;
    }
    .container {
      padding: 24px 16px;
      border-radius: 16px;
    }
    h1 { font-size: 1.7rem; }
    .subtitle { font-size: 0.85rem; margin-bottom: 18px; }
    .number-cards { gap: 10px; grid-template-columns: repeat(2, min(40vw, 160px)); }
    .card, .card-edit {
      font-size: min(14vw, 5rem); border-radius: 10px;
    }
    .op-row { gap: 8px; }
    .op-btn {
      width: 0; flex: 1; max-width: 80px;
      height: 64px; font-size: min(7vw, 2.4rem);
    }
    .btn-row { flex-wrap: wrap; gap: 8px; }
    button { flex: 1; min-width: 0; padding: 14px 10px; font-size: 0.95rem; }
    .solution-list li { font-size: 0.9rem; }
    .solution-list { max-height: 35vh; }
  }
  @media screen and (max-width: 360px) {
    .container { padding: 20px 12px; }
    h1 { font-size: 1.5rem; }
    .number-cards { grid-template-columns: repeat(2, min(40vw, 140px)); }
    .card, .card-edit { font-size: min(12vw, 4.5rem); }
    .op-btn { height: 56px; font-size: min(6vw, 2rem); }
    .solution-list li { font-size: 0.85rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>24 Game</h1>
  <p class="subtitle">Pick a number, an operator, then another number. Make 24!</p>

  <div class="number-cards" id="cards"></div>

  <div class="op-row">
    <button class="op-btn" id="op-add" onclick="operate('+')" disabled>+</button>
    <button class="op-btn" id="op-sub" onclick="operate('-')" disabled>&minus;</button>
    <button class="op-btn" id="op-mul" onclick="operate('*')" disabled>&times;</button>
    <button class="op-btn" id="op-div" onclick="operate('/')" disabled>&divide;</button>
  </div>

  <div class="message" id="message">Press <b>New Game</b> to start!</div>

  <ul class="steps" id="steps"></ul>

  <div class="btn-row">
    <button class="btn-new" onclick="newGame()">New Game</button>
    <button class="btn-edit" id="btn-edit" onclick="toggleEdit()">Edit</button>
    <button class="btn-undo" onclick="undo()">Undo</button>
    <button class="btn-hint" onclick="showHint()">Hint</button>
  </div>

  <div id="hint-area"></div>
</div>

<script>
// ── Solver (kept for hint / guaranteed solvable deals) ───

function permutations(arr) {
  if (arr.length <= 1) return [arr];
  const result = [];
  for (let i = 0; i < arr.length; i++) {
    const rest = arr.slice(0, i).concat(arr.slice(i + 1));
    for (const p of permutations(rest)) result.push([arr[i], ...p]);
  }
  return result;
}

function applyOp(a, b, op) {
  switch (op) {
    case '+': return a + b;
    case '-': return a - b;
    case '*': return a * b;
    case '/': return b !== 0 ? a / b : NaN;
  }
}

const OPS = ['+', '-', '*', '/'];
const OP_DISPLAY = { '+':'+', '-':'\u2212', '*':'\u00d7', '/':'\u00f7' };

function needsParens(childOp, parentOp, isRight) {
  if (!childOp) return false;
  const childPrec = (childOp === '*' || childOp === '/') ? 2 : 1;
  const parentPrec = (parentOp === '*' || parentOp === '/') ? 2 : 1;
  if (childPrec < parentPrec) return true;
  if (isRight && (parentOp === '-' || parentOp === '/') && childPrec === parentPrec) return true;
  return false;
}

function wrapExpr(expr, parentOp, isRight) {
  if (needsParens(expr.op, parentOp, isRight)) return '(' + expr.text + ')';
  return expr.text;
}

function combineExpr(left, right, op) {
  const text = wrapExpr(left, op, false) + ' ' + OP_DISPLAY[op] + ' ' + wrapExpr(right, op, true);
  return { text, op };
}

function solve24(numbers) {
  const solutions = new Set();
  const EPS = 1e-9;
  for (const perm of permutations(numbers)) {
    const [a,b,c,d] = perm;
    const ea = {text:String(a),op:null}, eb = {text:String(b),op:null};
    const ec = {text:String(c),op:null}, ed = {text:String(d),op:null};
    for (const o1 of OPS) for (const o2 of OPS) for (const o3 of OPS) {
      // ((a o1 b) o2 c) o3 d
      { const v = applyOp(applyOp(applyOp(a,b,o1),c,o2),d,o3);
        if (Math.abs(v-24)<EPS) solutions.add(combineExpr(combineExpr(combineExpr(ea,eb,o1),ec,o2),ed,o3).text); }
      // (a o1 (b o2 c)) o3 d
      { const v = applyOp(applyOp(a,applyOp(b,c,o2),o1),d,o3);
        if (Math.abs(v-24)<EPS) solutions.add(combineExpr(combineExpr(ea,combineExpr(eb,ec,o2),o1),ed,o3).text); }
      // (a o1 b) o2 (c o3 d)
      { const v = applyOp(applyOp(a,b,o1),applyOp(c,d,o3),o2);
        if (Math.abs(v-24)<EPS) solutions.add(combineExpr(combineExpr(ea,eb,o1),combineExpr(ec,ed,o3),o2).text); }
      // a o1 ((b o2 c) o3 d)
      { const v = applyOp(a,applyOp(applyOp(b,c,o2),d,o3),o1);
        if (Math.abs(v-24)<EPS) solutions.add(combineExpr(ea,combineExpr(combineExpr(eb,ec,o2),ed,o3),o1).text); }
      // a o1 (b o2 (c o3 d))
      { const v = applyOp(a,applyOp(b,applyOp(c,d,o3),o2),o1);
        if (Math.abs(v-24)<EPS) solutions.add(combineExpr(ea,combineExpr(eb,combineExpr(ec,ed,o3),o2),o1).text); }
    }
  }
  return [...solutions];
}

// ── Game state ───────────────────────────────────────────

let cards = [];        // current values (null = used)
let firstIdx = null;   // index of first selected number
let chosenOp = null;   // selected operator
let history = [];      // for undo: snapshots
let stepsLog = [];     // display log
let exprs = [];        // expression string per card (builds up the equation)
let originalNums = []; // for hint
let gameOver = false;
let editMode = false;

function formatNum(n) {
  return Number.isInteger(n) ? String(n) : n.toFixed(4).replace(/0+$/, '').replace(/\.$/, '');
}

// ── Render ───────────────────────────────────────────────

function render() {
  const container = document.getElementById('cards');
  container.innerHTML = '';

  if (editMode) {
    originalNums.forEach((val, i) => {
      const input = document.createElement('input');
      input.type = 'number';
      input.className = 'card-edit';
      input.min = 1;
      input.max = 13;
      input.inputMode = 'numeric';
      input.pattern = '[0-9]*';
      input.value = val;
      input.id = 'edit-' + i;
      container.appendChild(input);
    });
    // Disable operators in edit mode
    document.querySelectorAll('.op-btn').forEach(b => {
      b.disabled = true;
      b.classList.remove('op-selected');
    });
  } else {
    cards.forEach((val, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      if (val === null) {
        el.classList.add('used');
      } else {
        el.textContent = formatNum(val);
        if (i === firstIdx) el.classList.add('selected');
        el.onclick = () => selectCard(i);
      }
      container.appendChild(el);
    });

    // Operators enabled after first number is picked
    const opEnabled = firstIdx !== null && !gameOver;
    document.querySelectorAll('.op-btn').forEach(b => {
      b.disabled = !opEnabled;
      b.classList.remove('op-selected');
    });
    if (chosenOp !== null) {
      const opId = { '+':'op-add', '-':'op-sub', '*':'op-mul', '/':'op-div' }[chosenOp];
      document.getElementById(opId).classList.add('op-selected');
    }
  }

  // Update edit button label
  document.getElementById('btn-edit').textContent = editMode ? 'Play' : 'Edit';

  const stepsEl = document.getElementById('steps');
  stepsEl.innerHTML = stepsLog.map(s => `<li>${s}</li>`).join('');
}

function setMessage(text, cls) {
  const el = document.getElementById('message');
  el.className = 'message' + (cls ? ' ' + cls : '');
  el.innerHTML = text;
}

// ── Game actions ─────────────────────────────────────────

function selectCard(i) {
  if (gameOver) return;

  // Step 1: pick first number
  if (firstIdx === null) {
    firstIdx = i;
    setMessage('Now pick an operator');
    render();
    return;
  }

  // Tapping the same card again deselects it (reset to step 1)
  if (firstIdx === i && chosenOp === null) {
    firstIdx = null;
    setMessage('Pick a number');
    render();
    return;
  }

  // Tapping a different card before choosing an operator switches selection
  if (chosenOp === null && i !== firstIdx) {
    firstIdx = i;
    setMessage('Now pick an operator');
    render();
    return;
  }

  // Step 3: pick second number (operator already chosen)
  if (chosenOp !== null && i !== firstIdx) {
    const a = cards[firstIdx], b = cards[i];

    if (chosenOp === '/' && b === 0) {
      setMessage('Cannot divide by zero! Pick a different number.', 'lose');
      return;
    }

    const result = applyOp(a, b, chosenOp);
    if (!isFinite(result)) {
      setMessage('Invalid operation! Pick a different number.', 'lose');
      return;
    }

    // Save state for undo
    history.push({ cards: [...cards], stepsLog: [...stepsLog], exprs: exprs.map(e => e ? {...e} : null) });

    // Build combined expression with minimal parentheses
    const newExpr = combineExpr(exprs[firstIdx], exprs[i], chosenOp);
    exprs[i] = newExpr;
    exprs[firstIdx] = null;

    // Log as one equation
    stepsLog = [newExpr.text + ' = ' + formatNum(result)];

    // Update cards: put result in second selected, null out first
    cards[i] = result;
    cards[firstIdx] = null;
    const resultIdx = i;
    chosenOp = null;

    // Check if done
    const remaining = cards.filter(v => v !== null);
    if (remaining.length === 1) {
      gameOver = true;
      firstIdx = null;
      if (Math.abs(remaining[0] - 24) < 1e-9) {
        setMessage('You got 24! Well done!', 'win');
      } else {
        setMessage(`You got ${formatNum(remaining[0])}, not 24. Try again!`, 'lose');
      }
    } else {
      // Auto-select the result for the next step
      firstIdx = resultIdx;
      setMessage('Now pick an operator');
    }

    render();
    document.getElementById('hint-area').innerHTML = '';
  }
}

function operate(op) {
  if (firstIdx === null || gameOver) return;
  chosenOp = op;
  setMessage('Now pick the second number');
  render();
}

function undo() {
  if (history.length === 0) {
    // Also reset any in-progress selection
    firstIdx = null;
    chosenOp = null;
    if (!gameOver) {
      setMessage('Pick a number');
      render();
    }
    return;
  }
  const prev = history.pop();
  cards = prev.cards;
  stepsLog = prev.stepsLog;
  exprs = prev.exprs;
  firstIdx = null;
  chosenOp = null;
  gameOver = false;
  setMessage('Pick a number');
  render();
  document.getElementById('hint-area').innerHTML = '';
}

function startGame(nums) {
  originalNums = [...nums];
  cards = [...nums];
  exprs = nums.map(n => ({ text: String(n), op: null }));
  firstIdx = null;
  chosenOp = null;
  history = [];
  stepsLog = [];
  hintLevel = 0;
  gameOver = false;
  setMessage('Pick a number');
  render();
  document.getElementById('hint-area').innerHTML = '';
}

function newGame() {
  editMode = false;
  const nums = [0,0,0,0].map(() => Math.floor(Math.random() * 13) + 1);
  startGame(nums);
}

function toggleEdit() {
  if (!editMode) {
    // Enter edit mode
    editMode = true;
    setMessage('Edit the numbers, then press <b>Play</b>');
    render();
  } else {
    // Read values and start game
    const nums = [0,1,2,3].map(i => parseInt(document.getElementById('edit-' + i).value, 10));
    if (nums.some(n => isNaN(n) || n < 1 || n > 13)) {
      setMessage('Enter 4 numbers from 1 to 13.', 'lose');
      return;
    }
    editMode = false;
    startGame(nums);
  }
}

let hintLevel = 0; // 0 = not shown, 1 = yes/no shown, 2 = solutions shown

function showHint() {
  const solutions = solve24(originalNums);
  const area = document.getElementById('hint-area');

  if (solutions.length === 0) {
    area.innerHTML = `
      <div class="result-box" style="border-color: rgba(255,80,80,0.4);">
        <div class="result-title" style="color: #ff8a8a; margin-bottom: 0;">No solution exists for [${originalNums.join(', ')}].</div>
      </div>`;
    hintLevel = 2;
    return;
  }

  if (hintLevel === 0) {
    area.innerHTML = `
      <div class="result-box">
        <div class="result-title" style="margin-bottom: 0;">A solution exists! Click Hint again to reveal.</div>
      </div>`;
    hintLevel = 1;
  } else {
    const items = solutions.map(s => `<li>${s} = 24</li>`).join('');
    area.innerHTML = `
      <div class="result-box">
        <div class="result-title">Solutions for [${originalNums.join(', ')}]</div>
        <ul class="solution-list">${items}</ul>
        <div class="solution-count">${solutions.length} expression(s)</div>
      </div>`;
    hintLevel = 2;
  }
}

// ── Init ─────────────────────────────────────────────────
newGame();
</script>
</body>
</html>
